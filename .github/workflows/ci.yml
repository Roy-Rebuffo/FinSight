name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    services:
      # GitHub Actions levanta un PostgreSQL real para los tests
      # aunque nosotros usamos SQLite en memoria, lo dejamos
      # como buena práctica para futuros tests de integración
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: finsight_user
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: finsight_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev build-essential

      - name: Install Python dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+psycopg2://finsight_user:testpassword@localhost:5432/finsight_test
          SECRET_KEY: test-secret-key-for-ci-only-not-production
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 30
          REFRESH_TOKEN_EXPIRE_DAYS: 7
          REDIS_URL: redis://localhost:6379/0
          GROQ_API_KEY: test-key
          ENVIRONMENT: test
        run: |
          pytest tests/ -v --tb=short

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: backend/.pytest_cache